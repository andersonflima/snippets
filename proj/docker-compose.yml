services:
  postgres:
    image: postgres:16-alpine
    container_name: aws-platform-postgres
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U platform -d platform']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: aws-platform-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      JWT_SECRET: change-me-please
      DATABASE_URL: postgres://platform:platform@postgres:5432/platform
      DATABASE_SSL: 'false'
      AWS_ASSUME_ROLE_ARN_TEMPLATE: arn:aws:iam::{account_id}:role/PlatformAssumeRole
      AWS_EXTERNAL_ID: ${AWS_EXTERNAL_ID:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    ports:
      - '3000:3000'

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: aws-platform-frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - '4200:80'

volumes:
  postgres_data:
