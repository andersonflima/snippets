services:
  postgres:
    image: postgres:16-alpine
    container_name: aws-platform-postgres
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  localstack:
    profiles: ["embedded-localstack"]
    image: ${LOCALSTACK_IMAGE:-localstack/localstack:4.12.0}
    container_name: aws-platform-localstack
    ports:
      - "${LOCALSTACK_EDGE_PORT:-4566}:4566"
    environment:
      DEBUG: ${LOCALSTACK_DEBUG:-0}
      PERSISTENCE: ${LOCALSTACK_PERSISTENCE:-1}
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN:-}
    volumes:
      - localstack_data:/var/lib/localstack
      - ./docker/localstack/init:/etc/localstack/init/ready.d
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "awslocal sts get-caller-identity >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

